version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    groups:
      cargo-patch-minor:
        update-types:
          - patch
          - minor

  - package-ecosystem: github-actions
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/New_York
    open-pull-requests-limit: 5
    groups:
      actions-patch-minor:
        update-types:
          - patch
          - minor

  - package-ecosystem: docker
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    groups:
      docker-patch-minor:
        update-types:
          - patch
          - minor
