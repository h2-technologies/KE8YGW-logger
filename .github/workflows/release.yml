name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing production tag to validate without publishing"
        required: true
        type: string

permissions: {}

jobs:
  validate-production-tag:
    name: Validate production tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      sha: ${{ steps.tag.outputs.sha }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout full history
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          fetch-depth: 0

      - name: Resolve and validate tag
        id: tag
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="${INPUT_TAG:-${GITHUB_REF_NAME}}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Production tags must match vMAJOR.MINOR.PATCH: $tag" >&2
            exit 1
          fi
          git fetch --force origin main "refs/tags/$tag:refs/tags/$tag"
          sha="$(git rev-list -n 1 "$tag")"
          if ! git merge-base --is-ancestor "$sha" origin/main; then
            echo "Tagged commit $sha is not contained in origin/main." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Validate workspace version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          python scripts/check_versions.py --release-tag "$tag"
          version="$(python scripts/check_versions.py --print-version)"
          if [[ "v$version" != "$tag" ]]; then
            echo "Tag $tag does not match workspace version $version." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify main CI passed for tagged commit
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sha="${{ steps.tag.outputs.sha }}"
          status="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow CI --commit "$sha" --branch main --limit 1 --json status,conclusion --jq '.[0] | "\(.status) \(.conclusion)"')"
          if [[ "$status" != "completed success" ]]; then
            echo "No successful completed main CI run found for $sha; got '${status:-none}'." >&2
            exit 1
          fi

  release:
    name: Release build (${{ matrix.os }})
    needs: validate-production-tag
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            binary: ham-gui
            archive_ext: tar.gz
          - os: windows-latest
            platform: windows-x86_64
            binary: ham-gui.exe
            archive_ext: zip
          - os: macos-latest
            platform: macos
            binary: ham-gui
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          ref: ${{ needs.validate-production-tag.outputs.sha }}
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: 1.96.0

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build release binary
        run: cargo build --locked --release -p ham-gui --bin ham-gui

      - name: Package artifact
        id: package
        shell: pwsh
        run: |
          $platform = "${{ matrix.platform }}"
          if ($platform -eq "macos") {
            $arch = (uname -m).Trim()
            if ($arch -eq "arm64") {
              $platform = "macos-aarch64"
            } else {
              $platform = "macos-x86_64"
            }
          }

          $artifactBase = "ke8ygw-logger-${{ needs.validate-production-tag.outputs.version }}-$platform"
          $dist = "dist/$artifactBase"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null

          $sourceBinary = "target/release/${{ matrix.binary }}"
          $destBinary = if ("${{ runner.os }}" -eq "Windows") {
            "$dist/ke8ygw-logger.exe"
          } else {
            "$dist/ke8ygw-logger"
          }
          Copy-Item $sourceBinary $destBinary

          Copy-Item README.md "$dist/README.md"

          if ("${{ matrix.archive_ext }}" -eq "zip") {
            $archive = "dist/$artifactBase.zip"
            Compress-Archive -Path "$dist/*" -DestinationPath $archive -Force
          } else {
            $archive = "dist/$artifactBase.tar.gz"
            tar -czf $archive -C dist $artifactBase
          }

          "artifact=$archive" >> $env:GITHUB_OUTPUT
          "artifact_name=$(Split-Path $archive -Leaf)" >> $env:GITHUB_OUTPUT

      - name: Generate checksum
        shell: pwsh
        run: |
          $artifact = "${{ steps.package.outputs.artifact }}"
          $hash = (Get-FileHash -Algorithm SHA256 $artifact).Hash.ToLowerInvariant()
          "$hash  $(Split-Path $artifact -Leaf)" | Set-Content -NoNewline "$artifact.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: |
            ${{ steps.package.outputs.artifact }}
            ${{ steps.package.outputs.artifact }}.sha256
          compression-level: 0

  attest-release-artifacts:
    name: Attest release artifacts
    if: github.event_name == 'push'
    needs:
      - validate-production-tag
      - release
    runs-on: ubuntu-latest
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: ke8ygw-logger-*
          path: dist/release-assets
          merge-multiple: true

      - name: Attest release archives and checksums
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/release-assets/*.tar.gz
            dist/release-assets/*.zip
            dist/release-assets/*.sha256

  publish-release:
    name: Publish GitHub Release
    if: github.event_name == 'push'
    needs:
      - validate-production-tag
      - release
      - attest-release-artifacts
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: ke8ygw-logger-*
          path: dist/release-assets
          merge-multiple: true

      - name: Upload GitHub Release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ needs.validate-production-tag.outputs.tag }}
          files: |
            dist/release-assets/*.tar.gz
            dist/release-assets/*.zip
            dist/release-assets/*.sha256
          fail_on_unmatched_files: true
