name: iOS Native

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ios:
    name: Rust FFI and iOS Simulator
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Show toolchains
        run: |
          set -euo pipefail
          echo "host arch: $(uname -m)"
          if [[ "$(uname -m)" != "arm64" ]]; then
            echo "error: iOS CI expects an arm64 macOS runner for aarch64-apple-ios-sim builds." >&2
            exit 1
          fi
          swift --version
          xcodebuild -version
          rustc --version
          cargo --version

      - name: Build and stage simulator Rust FFI
        env:
          CONFIGURATION: Debug
          IOS_RUST_TARGETS: aarch64-apple-ios-sim
          CARGO_PROFILE_DEV_DEBUG: "1"
          CARGO_PROFILE_DEV_SPLIT_DEBUGINFO: "off"
        run: bash scripts/ios/build-rust.sh

      - name: Pick iOS simulator
        id: simulator
        shell: bash
        run: |
          set -euo pipefail
          DEVICE="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ {gsub(/^[ \t]+|[ \t]+$/, "", $1); print $1; exit}')"
          if [[ -z "$DEVICE" ]]; then
            DEVICE="iPhone 16"
          fi
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"
          echo "Using simulator: $DEVICE"

      - name: Build and test iOS simulator target
        env:
          SKIP_RUST_XCFRAMEWORK_BUILD: "1"
        run: |
          set -euo pipefail
          mkdir -p build
          xcodebuild \
            -project "ios/KE8YGWLogger/KE8YGWLogger.xcodeproj" \
            -scheme "KE8YGWLogger" \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.device }}" \
            -resultBundlePath "build/ios-tests.xcresult" \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Upload Xcode result bundle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcresult
          path: build/ios-tests.xcresult
          if-no-files-found: ignore
