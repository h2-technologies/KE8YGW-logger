name: iOS Native

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ios:
    name: Rust FFI and iOS Simulator
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Show toolchains
        run: |
          swift --version
          xcodebuild -version
          rustc --version
          cargo --version

      - name: Build HamIOSFFI XCFramework
        run: bash scripts/ios/build-xcframework.sh

      - name: Verify HamIOSFFI linkage
        run: bash scripts/ios/verify-linkage.sh

      - name: Run Rust FFI tests
        run: cargo test -p ham-ios-ffi

      - name: Pick iOS simulator
        id: simulator
        shell: bash
        run: |
          set -euo pipefail
          DEVICE="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ {gsub(/^[ \t]+|[ \t]+$/, "", $1); print $1; exit}')"
          if [[ -z "$DEVICE" ]]; then
            DEVICE="iPhone 16"
          fi
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"
          echo "Using simulator: $DEVICE"

      - name: Build iOS simulator target
        run: |
          xcodebuild \
            -project "ios/KE8YGWLogger/KE8YGWLogger.xcodeproj" \
            -scheme "KE8YGWLogger" \
            -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.device }}" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run Swift unit tests
        run: |
          mkdir -p build
          xcodebuild \
            -project "ios/KE8YGWLogger/KE8YGWLogger.xcodeproj" \
            -scheme "KE8YGWLogger" \
            -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.device }}" \
            -resultBundlePath "build/ios-tests.xcresult" \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Upload Xcode result bundle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcresult
          path: build/ios-tests.xcresult
          if-no-files-found: ignore
